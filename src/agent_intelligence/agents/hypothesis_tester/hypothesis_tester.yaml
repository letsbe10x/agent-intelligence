name: hypothesis_tester
version: "2"
prompt_path: prompt.md

provider:
  name: anthropic
  model: claude-sonnet-4-7
  api_key: ${env:ANTHROPIC_API_KEY:-}
  temperature: 0.3
  max_output_tokens: 1500
  timeout_s: 60

budget:
  max_usd_per_run: 0.50

observability:
  receipts_enabled: true

tool_sources:
  - type: builtin
    name: synthesis
    config:
      allowlist: [synthesize.extract_themes]
  - type: skillhub
    name: research-skills
    config:
      allowlist:
        - lets-brainstorm
        - lets-research-prd-grooming

max_iterations: 15
