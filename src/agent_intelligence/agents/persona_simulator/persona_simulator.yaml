# persona_simulator — agentic config with TOOL MIXTURE
# The LLM picks among: built-in tools + ALL skill-hub skills + (optional) MCP tools.
name: persona_simulator
version: "3"
prompt_path: prompt.md

provider:
  name: anthropic
  model: claude-sonnet-4-7
  api_key: ${env:ANTHROPIC_API_KEY:-}
  temperature: 0.7
  max_output_tokens: 1500
  timeout_s: 90

budget:
  max_usd_per_run: 2.0
  max_input_tokens_per_run: 80000
  max_output_tokens_per_run: 20000

observability:
  receipts_enabled: true

# Tool sources are PLUGGABLE. Mix built-in functions with skill-hub skills.
# Runtime overrides can add MCP server tools too.
tool_sources:
  - type: builtin
    name: persona-builtins
    config:
      allowlist:
        - persona.generate
        - persona.evaluate_diversity
        - synthesize.extract_themes
        - synthesize.finalize_validation

  - type: skillhub
    name: research-skills
    config:
      # Only expose research/brainstorm skills as agent tools — keep the catalog focused
      allowlist:
        - lets-research-competitive-scan
        - lets-research-prd-grooming
        - lets-brainstorm
        - lets-opportunity-discovery

max_iterations: 25
max_parse_retries: 2
