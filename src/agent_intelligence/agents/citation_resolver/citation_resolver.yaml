name: citation_resolver
version: "3"
prompt_path: prompt.md

provider:
  name: anthropic
  model: claude-sonnet-4-7
  api_key: ${env:ANTHROPIC_API_KEY:-}
  temperature: 0.2
  max_output_tokens: 1500
  timeout_s: 90

budget:
  max_usd_per_run: 1.0

observability:
  receipts_enabled: true

tool_sources:
  - type: builtin
    name: citation-builtins
    config:
      allowlist:
        - http.get
        - lookup.id
        - verify.semantic
        - citation.finalize

max_iterations: 30
