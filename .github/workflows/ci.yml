name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        run: pip install uv
      - name: Create venv + install
        run: |
          uv venv .venv
          . .venv/bin/activate
          uv pip install -e '.[dev,anthropic,openai]'
      - name: Run tests
        run: |
          . .venv/bin/activate
          pytest -v --tb=short
      - name: Smoke CLI
        run: |
          . .venv/bin/activate
          ai-cli list-agents
          ai-cli list-providers
          python examples/e2e_validation.py --mock

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check src tests
